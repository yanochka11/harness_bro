// — small helpers ----------------------------------------------------------
function CopyButton({ text, label = 'Copy' }) {
  const [copied, setCopied] = useState(false);
  const onClick = async () => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch {}
  };
  return e('button', {
    onClick,
    className: 'flex items-center gap-1.5 px-2.5 py-1 text-xs font-mono rounded-md border border-white/10 bg-white/5 hover:bg-white/10 hover:border-accent-400/40 transition'
  },
    e(copied ? Check : Copy, { className: `w-3.5 h-3.5 ${copied ? 'text-accent-400' : ''}` }),
    copied ? 'copied' : label
  );
}

function FadeIn({ children, delay = 0, y = 20 }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, margin: '-50px' });
  return e(motion.div, {
    ref,
    initial: { opacity: 0, y },
    animate: inView ? { opacity: 1, y: 0 } : { opacity: 0, y },
    transition: { duration: 0.6, delay, ease: [0.16, 1, 0.3, 1] },
  }, children);
}

function Counter({ to, suffix = '' }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true });
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!inView) return;
    let start = 0;
    const dur = 1500;
    const t0 = performance.now();
    const step = (t) => {
      const p = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(Math.floor(start + (to - start) * eased));
      if (p < 1) requestAnimationFrame(step);
      else setN(to);
    };
    requestAnimationFrame(step);
  }, [inView, to]);
  return e('span', { ref }, `${n}${suffix}`);
}
