<script type="module">
import React, { useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import { motion, useInView, AnimatePresence, useScroll, useTransform, useMotionValue, useSpring } from 'framer-motion';

const e = React.createElement;
const GITHUB_URL = 'https://github.com/yanochka11/harness_bro';

// ─── helpers ──────────────────────────────────────────────────────
function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  return e('button', {
    onClick: async () => {
      try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false), 1800); } catch {}
    },
    className: 'font-mono text-xs text-ink-600 hover:text-em-400 transition-colors px-2 py-1 flex items-center gap-1.5',
  }, copied ? '✓ copied' : 'copy');
}

function FadeUp({ children, delay = 0, y = 16 }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, margin: '-60px' });
  return e(motion.div, {
    ref,
    initial: { opacity: 0, y },
    animate: inView ? { opacity: 1, y: 0 } : {},
    transition: { duration: 0.7, delay, ease: [0.16, 1, 0.3, 1] },
  }, children);
}

function Counter({ to }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true });
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!inView) return;
    const dur = 1400;
    const t0 = performance.now();
    const step = (t) => {
      const p = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(Math.floor(to * eased));
      if (p < 1) requestAnimationFrame(step);
      else setN(to);
    };
    requestAnimationFrame(step);
  }, [inView, to]);
  return e('span', { ref }, n);
}

// cursor glow follower (only on desktop)
function CursorGlow() {
  const x = useMotionValue(-1000);
  const y = useMotionValue(-1000);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (window.matchMedia('(hover: none)').matches) return;
    const move = (e) => { x.set(e.clientX); y.set(e.clientY); setVisible(true); };
    window.addEventListener('mousemove', move);
    return () => window.removeEventListener('mousemove', move);
  }, []);
  const sx = useSpring(x, { stiffness: 60, damping: 25, mass: 0.5 });
  const sy = useSpring(y, { stiffness: 60, damping: 25, mass: 0.5 });
  return e(motion.div, {
    className: 'cursor-glow hidden md:block',
    style: { left: sx, top: sy, opacity: visible ? 1 : 0 },
  });
}

}

        transition: { duration: 0.8, delay: 0.3, ease: [0.16, 1, 0.3, 1] },
        className: 'border border-em-400/20 rounded-xl bg-ink-50/80 backdrop-blur max-w-3xl glow glow-hover'
      },
        e('div', { className: 'flex items-center justify-between border-b border-soft px-4 py-2.5' },
          e('div', { className: 'flex items-center gap-2.5' },
            e('span', { className: 'flex gap-1' },
              e('span', { className: 'w-2.5 h-2.5 rounded-full bg-red-500/40' }),
              e('span', { className: 'w-2.5 h-2.5 rounded-full bg-yellow-500/40' }),
              e('span', { className: 'w-2.5 h-2.5 rounded-full bg-green-500/40' }),
            ),
            e('span', { className: 'font-mono text-xs text-ink-500 ml-2' }, 'install'),
          ),
          e(CopyButton, { text: cmd }),
        ),
        e('div', { className: 'p-5 font-mono text-sm md:text-base overflow-x-auto no-scrollbar text-ink-800 leading-relaxed' },
          e('span', { className: 'text-em-400 select-none' }, '$ '),
          'curl -fsSL ',
          e('span', { className: 'text-ink-700' }, 'https://raw.githubusercontent.com/yanochka11/harness_bro/main/install.sh'),
          e('span', { className: 'text-em-400' }, ' | '),
          e('span', { className: 'text-ink-900' }, 'bash')
        ),
      ),

      // CTA links
      e(motion.div, {
        initial: { opacity: 0 }, animate: { opacity: 1 },
        transition: { duration: 0.8, delay: 0.45 },
        className: 'mt-8 flex flex-wrap items-center gap-x-8 gap-y-3 text-sm text-ink-600'
      },
        e('a', { href: GITHUB_URL, target: '_blank', rel: 'noopener',
          className: 'flex items-center gap-1.5 link-u hover:text-em-400 transition-colors' },
          'github.com/yanochka11/harness_bro', e('span', { className: 'text-ink-500' }, '↗')
        ),
        e('span', { className: 'text-ink-400' }, '·'),
        e('a', { href: '#install',
          className: 'flex items-center gap-1.5 link-u hover:text-em-400 transition-colors' },
          'Подробнее об установке', e('span', null, '↓'),
        ),
      ),
    )
  );
}

  const stats = [
    [99,'скиллов'], [6,'хуков'], [5,'субагентов'],
    [18,'команд'], [4,'MCP'], [43,'allow-list'],
  ];

    e('div', { className: 'absolute inset-0 bg-gradient-to-b from-em-500/[0.02] to-transparent pointer-events-none' }),
    e('div', { className: 'relative max-w-6xl mx-auto px-6 py-12' },
      e('div', { className: 'grid grid-cols-3 md:grid-cols-6 gap-x-8 gap-y-8' },

// ─── Features ─────────────────────────────────────────────────────
const FEATURES = [
  ['Защита от утечки секретов', 'Хук secret_guard блокирует Write/Edit и git commit/push/add при обнаружении ключей OpenAI, Anthropic, HuggingFace, GitHub, AWS, GCP, Slack, Stripe, W&B, JWT, PEM или паролей в DB-strings.'],

  ['AST-валидация Python', 'После Write/Edit на .py — AST + py_compile + ruff F-rules (F821 undefined name, F823 local-before-assignment, F811 redefinition). Сломанный код блокируется на месте.'],

// ─── Inside (file tree) ───────────────────────────────────────────
function Inside() {
  const rows = [
    { name:'agents/',   n:'5',  desc:'bug-hunter · code-writer · runner · paper-reader · researcher' },
