// ─── helpers ──────────────────────────────────────────────────────
function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  return e('button', {
    onClick: async () => {
      try {
        await navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      } catch {}
    },
    className: 'font-mono text-xs text-ink-600 hover:text-ink-900 transition-colors px-2 py-1',
    'aria-label': 'copy',
  }, copied ? 'copied' : 'copy');
}

function FadeUp({ children, delay = 0, y = 12 }) {
  const ref = useRef(null);
  const inView = useInView(ref, { once: true, margin: '-80px' });
  return e(motion.div, {
    ref,
    initial: { opacity: 0, y },
    animate: inView ? { opacity: 1, y: 0 } : {},
    transition: { duration: 0.8, delay, ease: [0.16, 1, 0.3, 1] },
  }, children);
}

// ─── Nav ──────────────────────────────────────────────────────────

    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);

    className: `fixed top-0 inset-x-0 z-50 transition-colors duration-300 ${

// ─── Install ─────────────────────────────────────────────────────
function Install() {
  const cmd = `curl -fsSL https://raw.githubusercontent.com/yanochka11/harness_bro/main/install.sh | bash`;
  const post = `cd ~/harness        # workspace, где лежит .claude/
claude              # интерактивная TUI-сессия Claude Code`;
  const proxy = `export HTTPS_PROXY="http://USER:PASS@HOST:PORT"
export HTTP_PROXY="$HTTPS_PROXY"
export NO_PROXY="localhost,127.0.0.1"

curl -fsSL https://raw.githubusercontent.com/yanochka11/harness_bro/main/install.sh | bash`;

  const Block = ({ title, body, cmd, comment }) =>
    e('div', { className: 'mb-10' },
      e('div', { className: 'flex items-center justify-between mb-3' },
        e('h3', { className: 'font-mono text-xs text-ink-500 tracking-wider uppercase' }, title),
        cmd && e(CopyButton, { text: cmd }),
      ),
      body && e('p', { className: 'text-sm text-ink-700 leading-relaxed mb-3 max-w-2xl' }, body),
      cmd && e('div', { className: 'border border-soft rounded-md bg-ink-50' },
        e('pre', { className: 'p-4 font-mono text-sm overflow-x-auto no-scrollbar text-ink-800 leading-relaxed' },
          e('code', null, cmd)
        )
      ),
      comment && e('p', { className: 'text-xs text-ink-500 mt-2 leading-relaxed' }, comment),
    );

  return e('section', { id: 'install', className: 'border-t border-soft py-32' },
    e('div', { className: 'max-w-5xl mx-auto px-6' },
      e(FadeUp, null,
        e('div', { className: 'mb-16 max-w-2xl' },
          e('div', { className: 'font-mono text-xs text-ink-500 tracking-wider mb-3 uppercase' }, 'install.sh'),
          e('h2', { className: 'text-4xl md:text-5xl text-ink-900 font-semibold tracking-tighter leading-tight mb-4' },
            'Установка'
          ),
          e('p', { className: 'text-base text-ink-600 leading-relaxed' },
            'Скрипт проверяет зависимости (', e('code', { className: 'font-mono text-ink-800' }, 'python ≥ 3.10'), ', ', e('code', { className: 'font-mono text-ink-800' }, 'node'), ', ', e('code', { className: 'font-mono text-ink-800' }, 'npm'), ', ', e('code', { className: 'font-mono text-ink-800' }, 'git'), '), клонирует репо, разворачивает .claude/ в целевую папку, рендерит CLAUDE.md и .mcp.json из шаблонов с подстановкой пути.'
          ),
        )
      ),

      e(FadeUp, { delay: 0.1 },
        e(Block, { title: '1 · Установить', cmd, comment: 'Идемпотентный — можно перезапускать. Существующие файлы автобэкапятся в *.bak.' })
      ),
      e(FadeUp, { delay: 0.15 },
        e(Block, {
          title: '2 · Запустить',
          body: 'cd в созданный workspace и запустить Claude Code. Откроется интерактивная TUI-сессия в терминале.',
          cmd: post,
          comment: 'Внутри сессии: /env, /gpu, /git-status — снимки состояния. Любой текст вне slash-команды — запрос Claude. Выход: Ctrl+D или /exit.',
        })
      ),
      e(FadeUp, { delay: 0.2 },
        e(Block, {
          title: '3 · MLSpace / прокси',
          body: 'На MLSpace и закрытых серверах сначала экспортируйте HTTPS_PROXY. Установщик подхватит, замаскирует пароль в логах, прокинет в npm config.',

          comment: 'Пароль не вставлять в код или git. Только в env vars или ~/.netrc.',
        })
      ),
    )
  );
}
