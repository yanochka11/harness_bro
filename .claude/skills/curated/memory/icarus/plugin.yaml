name: icarus
version: 0.3.0
description: Self-memory and replacement models for Hermes agents. Remember your work. Train your replacement.
author: esaradev
provides_tools:
  - fabric_recall
  - fabric_write
  - fabric_search
  - fabric_pending
  - fabric_curate
  - fabric_export
  - fabric_train
  - fabric_train_status
  - fabric_models
  - fabric_eval
  - fabric_switch_model
  - fabric_rollback_model
  - fabric_brief
  - fabric_telemetry
  - fabric_init_obsidian
  - fabric_report
provides_hooks:
  - on_session_start
  - pre_llm_call
  - post_llm_call
  - on_session_end
