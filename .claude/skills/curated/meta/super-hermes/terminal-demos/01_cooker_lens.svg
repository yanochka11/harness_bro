<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" viewBox="0 0 820 480">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .bar { fill: #313244; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .green { fill: #a6e3a1; }
      .title { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .text { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .cyan { fill: #89dceb; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .green-text { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .bold { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; font-weight: bold; }
      .purple { fill: #cba6f7; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .yellow-text { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
    </style>
  </defs>
  <rect class="bg" width="820" height="480" rx="10"/>
  <rect class="bar" width="820" height="36" rx="10 10 0 0"/>
  <circle class="red" cx="20" cy="18" r="6"/>
  <circle class="yellow" cx="40" cy="18" r="6"/>
  <circle class="green" cx="60" cy="18" r="6"/>
  <text class="title" x="410" y="22" text-anchor="middle">Hermes Agent — /prism-scan (real output)</text>

  <text class="purple" x="20" y="58">⚡ Loading skill: prism-scan</text>
  <text class="dim" x="20" y="78">  ┊ 🔎 grep      .prism-history.md  0.7s</text>
  <text class="text" x="20" y="100">No prior constraint history. Analyzing fresh.</text>

  <text class="cyan" x="20" y="128">## Generated Lens</text>
  <text class="bold" x="20" y="148">"Extract the temporal invariant in state transitions.</text>
  <text class="bold" x="20" y="164">Map every state path CLOSED → OPEN → HALF_OPEN → CLOSED.</text>
  <text class="text" x="20" y="180">For each transition, identify:</text>
  <text class="text" x="20" y="196">(1) what determines the transition happens,</text>
  <text class="text" x="20" y="212">(2) what could block it,</text>
  <text class="text" x="20" y="228">(3) whether state is mutated inside or outside</text>
  <text class="text" x="20" y="244">the critical section.</text>
  <text class="yellow-text" x="20" y="264">Build a second circuit breaker that INVERTS the</text>
  <text class="yellow-text" x="20" y="280">lock placement. Compare: which creates phantom states?</text>
  <text class="yellow-text" x="20" y="296">Which creates lost updates?"</text>

  <text class="cyan" x="20" y="326">## Conservation Law</text>
  <text class="green-text" x="20" y="346">"Decentralized lock placement in a state machine</text>
  <text class="green-text" x="20" y="362">with time-based transitions creates a fundamental</text>
  <text class="green-text" x="20" y="378">trade-off: either (1) atomicity is sacrificed, or</text>
  <text class="green-text" x="20" y="394">(2) lock contention increases because read operations</text>
  <text class="green-text" x="20" y="410">must hold the lock."</text>

  <text class="dim" x="20" y="440">CONSTRAINT NOTE: Maximized temporal correctness.</text>
  <text class="dim" x="20" y="456">Sacrificed: listener performance, integer overflow.</text>
  <text class="dim" x="20" y="472">For deeper: /prism-full | For meta: /prism-reflect</text>
</svg>
