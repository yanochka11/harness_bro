<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" viewBox="0 0 820 480">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .bar { fill: #313244; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .green { fill: #a6e3a1; }
      .title { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .text { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .cyan { fill: #89dceb; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .green-text { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .bold { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; font-weight: bold; }
      .yellow-text { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .red-text { fill: #f38ba8; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .purple { fill: #cba6f7; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .divider { fill: #45475a; }
    </style>
  </defs>
  <rect class="bg" width="820" height="480" rx="10"/>
  <rect class="bar" width="820" height="36" rx="10 10 0 0"/>
  <circle class="red" cx="20" cy="18" r="6"/>
  <circle class="yellow" cx="40" cy="18" r="6"/>
  <circle class="green" cx="60" cy="18" r="6"/>
  <text class="title" x="410" y="22" text-anchor="middle">Hermes Agent — Growth Loop: Scan 1 vs Scan 2 (real output)</text>

  <text class="yellow-text" x="20" y="58">── SCAN 1 (no .prism-history.md) ─────────────────────</text>
  <text class="purple" x="20" y="78">⚡ Loading skill: prism-scan</text>
  <text class="dim" x="20" y="96">  ┊ 🔎 grep .prism-history.md  0.7s</text>
  <text class="text" x="20" y="114">No prior constraint history. Analyzing fresh.</text>

  <text class="cyan" x="20" y="138">Generated Lens:</text>
  <text class="text" x="20" y="156">"Extract the temporal invariant in state transitions.</text>
  <text class="text" x="20" y="172">Build a second circuit breaker that inverts the lock</text>
  <text class="text" x="20" y="188">placement..."</text>
  <text class="dim" x="20" y="206">→ Focus: lock placement, phantom states, lost updates</text>

  <rect class="divider" x="20" y="222" width="780" height="1"/>

  <text class="red-text" x="20" y="244">── /prism-reflect saved constraints ──────────────────</text>
  <text class="text" x="20" y="264">Sacrificed: alternative designs, high-contention load,</text>
  <text class="text" x="20" y="280">listener blocking performance</text>
  <text class="dim" x="20" y="298">  ┊ ✍️ write  .prism-history.md  0.7s</text>

  <rect class="divider" x="20" y="314" width="780" height="1"/>

  <text class="green-text" x="20" y="336">── SCAN 2 (WITH .prism-history.md) ───────────────────</text>
  <text class="purple" x="20" y="356">⚡ Loading skill: prism-scan</text>
  <text class="bold" x="20" y="374">  ┊ 📖 read  .prism-history.md  0.9s</text>

  <text class="cyan" x="20" y="398">Generated Lens:</text>
  <text class="yellow-text" x="20" y="416">"Construct a high-contention HALF_OPEN scenario:</text>
  <text class="yellow-text" x="20" y="432">1000 threads call simultaneously. Count lock</text>
  <text class="yellow-text" x="20" y="448">acquisitions. Identify what saturates first..."</text>
  <text class="bold" x="20" y="468">→ DIFFERENT focus: listener blocking, contention, cascades</text>
</svg>
