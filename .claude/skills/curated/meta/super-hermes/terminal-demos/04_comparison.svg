<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" viewBox="0 0 820 480">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .bar { fill: #313244; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .green { fill: #a6e3a1; }
      .title { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .text { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .cyan { fill: #89dceb; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .green-text { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .red-text { fill: #f38ba8; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .bold { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px; font-weight: bold; }
      .yellow-text { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 11.5px; }
      .col-bg-left { fill: #181825; }
    </style>
  </defs>
  <rect class="bg" width="820" height="480" rx="10"/>
  <rect class="bar" width="820" height="36" rx="10 10 0 0"/>
  <circle class="red" cx="20" cy="18" r="6"/>
  <circle class="yellow" cx="40" cy="18" r="6"/>
  <circle class="green" cx="60" cy="18" r="6"/>
  <text class="title" x="410" y="22" text-anchor="middle">Vanilla vs Super Hermes — same model, same code, same cost</text>

  <!-- Left column: Vanilla -->
  <rect class="col-bg-left" x="10" y="46" width="390" height="424" rx="6"/>
  <text class="red-text" x="25" y="72">VANILLA HERMES</text>
  <text class="dim" x="25" y="92">339 words | ~$0.05</text>

  <text class="text" x="25" y="122">7 bugs found (surface checklist):</text>
  <text class="dim" x="25" y="142">✓ State property not thread-safe</text>
  <text class="dim" x="25" y="160">✓ No lock in state getter</text>
  <text class="dim" x="25" y="178">✓ Class-level shared dict</text>
  <text class="dim" x="25" y="196">✓ Missing context manager</text>
  <text class="dim" x="25" y="214">✓ ...</text>

  <text class="text" x="25" y="250">Conservation law:</text>
  <text class="red-text" x="25" y="270">None</text>

  <text class="text" x="25" y="306">Reports blind spots:</text>
  <text class="red-text" x="25" y="326">No</text>

  <text class="dim" x="25" y="374">→ Surface code review</text>
  <text class="dim" x="25" y="394">→ "Consider using a lock"</text>
  <text class="dim" x="25" y="414">→ Names the problem</text>

  <!-- Right column: Super Hermes -->
  <rect x="415" y="46" width="395" height="424" rx="6" fill="#11111b" stroke="#a6e3a1" stroke-width="1"/>
  <text class="green-text" x="430" y="72">SUPER HERMES (/prism-scan)</text>
  <text class="dim" x="430" y="92">1,485 words | ~$0.05</text>

  <text class="green-text" x="430" y="122">11 bugs with structural classification:</text>
  <text class="cyan" x="430" y="142">→ 6-step thread interleaving</text>
  <text class="cyan" x="430" y="160">→ Deadlock construction</text>
  <text class="cyan" x="430" y="178">→ Singleton race scenario</text>
  <text class="cyan" x="430" y="196">→ Exact line numbers + severity</text>
  <text class="cyan" x="430" y="214">→ Fixable vs structural</text>

  <text class="text" x="430" y="250">Conservation law:</text>
  <text class="green-text" x="430" y="270">Fault Isolation × Correctness</text>
  <text class="green-text" x="430" y="288">= Constant</text>

  <text class="text" x="430" y="322">Reports blind spots:</text>
  <text class="green-text" x="430" y="342">Yes — constraint footer</text>

  <text class="bold" x="430" y="382">→ Structural analysis</text>
  <text class="bold" x="430" y="402">→ WHY it must be this way</text>

  <text class="yellow-text" x="430" y="442">More bugs. Deeper bugs.</text>
  <text class="yellow-text" x="430" y="460">Plus what no vanilla review finds.</text>
</svg>
